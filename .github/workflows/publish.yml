# publish.yml — Renderiza o dashboard Quarto e publica no GitHub Pages.
#
# Quando dispara:
#   - Push para a branch `main`
#   - Manualmente, via "Run workflow" no GitHub Actions
#
# O que faz, passo a passo:
#   1. Faz checkout do repositório
#   2. Instala Quarto (versão estável mais recente)
#   3. Instala Python 3.11 + dependências (pandas, requests, jupyter, plotly...)
#   4. Roda `prep_data.py` para gerar o JSON e baixar o GeoJSON
#   5. Roda `quarto render` que constrói o site em `docs/`
#   6. Faz deploy do conteúdo de `docs/` no GitHub Pages
#
# Pré-requisito: nas Settings do repo > Pages, escolher "GitHub Actions" como source.

name: Publish Quarto Dashboard

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare data (JSON + GeoJSON)
        run: python prep_data.py

      - name: Render Quarto site
        run: quarto render

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
